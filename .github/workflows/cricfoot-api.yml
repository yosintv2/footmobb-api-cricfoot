name: Fotmob Future TV Listings

on:
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_and_scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install Dependencies
        run: |
          pip install curl_cffi pycountry awscli

      - name: Run Scraper
        run: |
          python future_scraper.py

      - name: Upload JSON Files to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          echo "Uploading to bucket: $R2_BUCKET"

          aws s3 sync date/ \
            s3://$R2_BUCKET/date/ \
            --endpoint-url $R2_ENDPOINT

      - name: Commit Updated JSON Files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add -A

          git diff --cached --quiet && exit 0

          git commit -m "Update future TV listings"

          git push
